 <!DOCTYPE html>
<html>
<body>

<h2>Chapter 1 Test</h2>
<h3 id="q"></h3>
<div id="opt"></div>
<p>Time: <span id="t">30</span></p>

<script>

let i=0,score=0,timer;
let answers=[];

let student=JSON.parse(localStorage.getItem("currentStudent"));

const questions=[
{q:"SI unit of charge?",o:["Newton","Joule","Coulomb","Watt"],a:2},
{q:"Electron charge?",o:["Positive","Negative","Neutral","Zero"],a:1},
{q:"Like charges?",o:["Attract","Repel","None","Neutral"],a:1},
{q:"Electric field unit?",o:["N/C","J","Volt","Amp"],a:0},
{q:"Dipole means?",o:["++","--","+-","0"],a:2}
];

function load(){

let qn=questions[i];
q.innerText=qn.q;

let html="";
qn.o.forEach((op,ind)=>{
html+=`<button onclick="ans(${ind})">${op}</button><br>`;
});
opt.innerHTML=html;

startTimer();
}

function startTimer(){
let time=30;
t.innerText=time;

clearInterval(timer);
timer=setInterval(()=>{
time--;
t.innerText=time;

if(time==0){
clearInterval(timer);
next();
}
},1000);
}

function ans(ind){
clearInterval(timer);

let correct=questions[i].o[questions[i].a];

answers.push({
user:questions[i].o[ind],
correct:correct
});

if(ind===questions[i].a) score++;

next();
}

function next(){
i++;
if(i<questions.length){
load();
}else{
finish();
}
}

function finish(){

let result={
name:student.name,
email:student.email,
score:score,
answers:answers
};

localStorage.setItem("testResult",JSON.stringify(result));

window.location.href="index.html#feedback";
}

load();

</script>

</body>
</html>
