 <!DOCTYPE html>
<html>
<head>
  <title>Physics Test Series</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{font-family:Arial;background:#0f172a;color:white;margin:0;}
    .container{max-width:800px;margin:20px auto;padding:20px;background:#1e293b;border-radius:10px;}
    input,button,select{padding:10px;margin:8px 0;width:100%;border:none;border-radius:5px;}
    button{background:#38bdf8;cursor:pointer;}
    .option{background:#334155;margin:5px 0;padding:10px;border-radius:5px;cursor:pointer;}
    .correct{background:#16a34a !important;}
    .wrong{background:#dc2626 !important;}

    .tracker{display:flex;flex-wrap:wrap;margin-top:10px;}
    .box{
      width:35px;height:35px;margin:4px;
      display:flex;align-items:center;justify-content:center;
      border-radius:5px;background:#475569;
    }
    .box.correct{background:#16a34a;}
    .box.wrong{background:#dc2626;}
  </style>
</head>
<body>

<div class="container" id="home">
  <h2>Physics Test</h2>
  <input id="name" placeholder="Name">
  <input id="email" placeholder="Email">
  <button onclick="startTest()">Start Test</button>
  <button onclick="showAdmin()">Admin</button>
</div>

<div class="container" id="test" style="display:none;">
  <h3 id="qText"></h3>
  <div id="options"></div>
  <p>Time: <span id="timer">30</span></p>

  <!-- Tracker -->
  <div class="tracker" id="tracker"></div>
</div>

<div class="container" id="result" style="display:none;">
  <h2 id="score"></h2>
  <button onclick="location.reload()">Restart</button>
</div>

<div class="container" id="admin" style="display:none;">
  <h2>Admin Panel</h2>
  <p>Total Students: <span id="total"></span></p>
  <table border="1" width="100%">
    <tr><th>Name</th><th>Email</th><th>Score</th></tr>
    <tbody id="data"></tbody>
  </table>
</div>

<script>
let qIndex=0, score=0, answers=[], timerInt;
let student={};

const questions=[
{q:"SI unit of charge?",o:["Newton","Joule","Coulomb","Watt"],a:2},
{q:"Electron charge?",o:["Positive","Negative","Neutral","Zero"],a:1},
{q:"Proton charge?",o:["Negative","Positive","Neutral","Varies"],a:1},
{q:"Like charges?",o:["Attract","Repel","None","Neutral"],a:1}
];

// START
function startTest(){
  let n=name.value.trim();
  let e=email.value.trim();
  if(!n||!e){alert("Enter details");return;}

  student={name:n,email:e};
  qIndex=0;score=0;answers=[];

  document.getElementById("home").style.display="none";
  document.getElementById("test").style.display="block";

  createTracker();
  loadQ();
}

// TRACKER BOXES
function createTracker(){
  tracker.innerHTML="";
  questions.forEach((_,i)=>{
    tracker.innerHTML+=`<div class="box" id="box${i}">${i+1}</div>`;
  });
}

// LOAD QUESTION
function loadQ(){
  clearInterval(timerInt);
  let t=30;
  timer.innerText=t;

  let q=questions[qIndex];
  qText.innerText=`Q${qIndex+1}: ${q.q}`;

  let html="";
  q.o.forEach((opt,i)=>{
    html+=`<div class="option" onclick="selectAns(${i},this)">${opt}</div>`;
  });
  options.innerHTML=html;

  timerInt=setInterval(()=>{
    t--; timer.innerText=t;
    if(t<=0){
      clearInterval(timerInt);
      nextQ();
    }
  },1000);
}

// SELECT ANSWER
function selectAns(i,el){
  let correct=questions[qIndex].a;

  document.querySelectorAll(".option").forEach(btn=>{
    btn.onclick=null;
  });

  if(i===correct){
    el.classList.add("correct");
    document.getElementById("box"+qIndex).classList.add("correct");
    score++;
  } else {
    el.classList.add("wrong");
    document.getElementById("box"+qIndex).classList.add("wrong");

    // show correct also
    document.querySelectorAll(".option")[correct].classList.add("correct");
  }

  setTimeout(nextQ,1000);
}

// NEXT QUESTION
function nextQ(){
  qIndex++;
  if(qIndex<questions.length){
    loadQ();
  } else {
    finishTest();
  }
}

// FINISH
function finishTest(){
  let data=JSON.parse(localStorage.getItem("students")||"[]");

  // FIX: overwrite same email instead of duplicate
  let existingIndex=data.findIndex(d=>d.email===student.email);
  if(existingIndex>=0){
    data[existingIndex]={...student,score};
  } else {
    data.push({...student,score});
  }

  localStorage.setItem("students",JSON.stringify(data));

  document.getElementById("test").style.display="none";
  document.getElementById("result").style.display="block";
  scoreEl.innerText=`Score: ${score}/${questions.length}`;
}

// ADMIN
function showAdmin(){
  let pass=prompt("Enter Password");
  if(pass!=="1234"){alert("Wrong");return;}

  document.getElementById("home").style.display="none";
  document.getElementById("admin").style.display="block";

  loadAdmin();
}

function loadAdmin(){
  let dataArr=JSON.parse(localStorage.getItem("students")||"[]");

  total.innerText=dataArr.length;

  let html="";
  dataArr.forEach(d=>{
    html+=`<tr><td>${d.name}</td><td>${d.email}</td><td>${d.score}</td></tr>`;
  });

  document.getElementById("data").innerHTML=html;
}
</script>

</body>
</html>
