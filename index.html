<!DOCTYPE html>
<html>
<head>
  <title>Physics Test Portal</title>
  <style>
    body{margin:0;font-family:'Segoe UI',Arial;background:#0f172a;color:white;}
    .navbar{display:flex;justify-content:space-between;padding:15px 25px;background:#020617;}
    .logo{font-size:20px;font-weight:bold;color:#38bdf8;cursor:pointer;}
    .menu a{color:white;margin-left:20px;text-decoration:none;cursor:pointer;}
    .menu a:hover{color:#38bdf8;}
    .container{max-width:900px;margin:20px auto;padding:20px;border-radius:10px;background:#1e293b;display:none;}
    input,textarea,select{padding:10px;width:95%;margin:8px 0;border-radius:5px;border:none;}
    .btn{padding:10px 20px;background:#38bdf8;border:none;border-radius:8px;cursor:pointer;font-weight:bold;margin-top:10px;}
    .btn:hover{background:#0ea5e9;}
    .answer-btn{display:block;margin:10px 0;padding:10px;width:100%;background:#38bdf8;border:none;border-radius:5px;cursor:pointer;}
    .answer-btn:hover{background:#0ea5e9;}
    .correct{color:green;font-weight:bold;}
    .wrong{color:red;font-weight:bold;}
    #timer-bar-container{width:100%;background:#334155;border-radius:5px;margin:10px 0;height:20px;}
    #timer-bar{width:100%;height:100%;background:#38bdf8;border-radius:5px;transition:width 1s linear;}
    #timer-text{text-align:right;margin-top:-20px;font-size:14px;}
    .tracker button{width:40px;height:40px;margin:5px;border:none;border-radius:5px;font-weight:bold;cursor:pointer;}
    table{width:100%;border-collapse:collapse;margin-top:15px;}
    th,td{padding:10px;border:1px solid #38bdf8;text-align:left;}
    th{background:#0ea5e9;}
    .footer{text-align:center;padding:15px;background:#020617;margin-top:20px;font-size:14px;}
  </style>
</head>
<body>

<div class="navbar">
  <div class="logo" onclick="showSlide('home')">Home</div>
  <div class="menu">
    <a onclick="showSlide('results')">Results</a>
    <a onclick="showAdmin()">Admin</a>
  </div>
</div>

<div class="container" id="home">
  <h1>Welcome to Physics Test Portal</h1>
  <button class="btn" onclick="showSlide('form')">Start</button>
</div>

<div class="container" id="form">
  <h2>Enter Details</h2>
  <input type="text" id="studentName" placeholder="Name">
  <input type="email" id="studentEmail" placeholder="Email">
  <div id="chapter-container"></div>
</div>

<div class="container" id="test">
  <div id="timer-bar-container"><div id="timer-bar"></div></div>
  <div id="timer-text"></div>
  <div id="question-container"></div>
  <div class="tracker" id="question-tracker"></div>
</div>

<div class="container" id="results">
  <h2>Results</h2>
  <p id="student-info"></p>
  <p id="score"></p>
  <div id="review"></div>
</div>

<div class="container" id="admin">
  <h2>Admin</h2>
  <button class="btn" onclick="adminReset()">Reset</button>
  <p>Total: <span id="admin-total-students">0</span></p>
  <table>
    <thead><tr><th>Name</th><th>Email</th><th>Chapter</th><th>Score</th></tr></thead>
    <tbody id="admin-body"></tbody>
  </table>
</div>

<script>
let student={name:"",email:""};
let currentChapter=0,currentQ=0,userAnswers=[];
let timerInterval,timeLeft=30;

const chapters=[
  {name:"Chapter 1",questions:[
    {q:"Unit of charge?",options:["Coulomb","Newton","Joule","Watt"],answer:0},
    {q:"Electron charge?",options:["Positive","Negative","Neutral","None"],answer:1}
  ]}
];

function showSlide(id){
  ["home","form","test","results","admin"].forEach(s=>{
    document.getElementById(s).style.display="none";
  });
  document.getElementById(id).style.display="block";
}

const chapterContainer=document.getElementById("chapter-container");
chapters.forEach((ch,i)=>{
  const btn=document.createElement("button");
  btn.className="btn";
  btn.innerText=ch.name;
  btn.onclick=()=>startChapter(i);
  chapterContainer.appendChild(btn);
});

function startChapter(idx){
  const name=document.getElementById("studentName").value.trim();
  const email=document.getElementById("studentEmail").value.trim();

  if(!name||!email){alert("Enter details");return;}

  student={name,email};
  currentChapter=idx;
  currentQ=0;
  userAnswers=[];

  showSlide("test");
  initTracker();
  showQuestion();
}

function initTracker(){
  const tracker=document.getElementById("question-tracker");
  tracker.innerHTML="";
  chapters[currentChapter].questions.forEach((q,i)=>{
    const btn=document.createElement("button");
    btn.id="q-btn-"+i;
    btn.innerText=i+1;
    tracker.appendChild(btn);
  });
}

function showQuestion(){
  clearInterval(timerInterval);
  timeLeft=30;
  updateTimer();

  const container=document.getElementById("question-container");
  container.innerHTML="";

  const qArr=chapters[currentChapter].questions;

  if(currentQ<qArr.length){
    const q=qArr[currentQ];
    container.innerHTML=`<strong>Q${currentQ+1}: ${q.q}</strong>`;

    ["A","B","C","D"].forEach((l,i)=>{
      const btn=document.createElement("button");
      btn.className="answer-btn";
      btn.innerText=`${l}. ${q.options[i]}`;
      btn.onclick=()=>selectAnswer(i);
      container.appendChild(btn);
    });

    timerInterval=setInterval(()=>{
      timeLeft--;
      updateTimer();
      if(timeLeft<=0){
        clearInterval(timerInterval);
        selectAnswer(null);
      }
    },1000);

  } else submitTest();
}

function updateTimer(){
  document.getElementById("timer-bar").style.width=(timeLeft/30*100)+"%";
  document.getElementById("timer-text").innerText=timeLeft+"s";
}

function selectAnswer(idx){
  const qArr=chapters[currentChapter].questions;
  userAnswers.push(idx);

  const btn=document.getElementById("q-btn-"+currentQ);

  if(idx===null){
    btn.style.background="gray";
  } else if(idx===qArr[currentQ].answer){
    btn.style.background="green";
  } else {
    btn.style.background="red";
  }

  currentQ++;
  showQuestion();
}

function submitTest(){
  clearInterval(timerInterval);
  showSlide("results");

  const qArr=chapters[currentChapter].questions;
  let score=0;
  let reviewHTML="";

  qArr.forEach((q,i)=>{
    if(userAnswers[i]===q.answer) score++;
    reviewHTML+=`<p>Q${i+1}: ${q.options[userAnswers[i]]||"No Answer"} | Correct: ${q.options[q.answer]}</p>`;
  });

  document.getElementById("student-info").innerText=`Name: ${student.name}, Email: ${student.email}`;
  document.getElementById("score").innerText=`Score: ${score}/${qArr.length}`;
  document.getElementById("review").innerHTML=reviewHTML;

  let results=JSON.parse(localStorage.getItem("results")||"[]");
  results.push({...student,chapter:chapters[currentChapter].name,score});
  localStorage.setItem("results",JSON.stringify(results));
}

function showAdmin(){
  const pass=prompt("Password:");
  if(pass==="1234"){
    showSlide("admin");
    loadAdmin();
  }
}

function loadAdmin(){
  const body=document.getElementById("admin-body");
  body.innerHTML="";
  const results=JSON.parse(localStorage.getItem("results")||"[]");

  document.getElementById("admin-total-students").innerText=results.length;

  results.forEach(r=>{
    const row=document.createElement("tr");
    row.innerHTML=`<td>${r.name}</td><td>${r.email}</td><td>${r.chapter}</td><td>${r.score}</td>`;
    body.appendChild(row);
  });
}

function adminReset(){
  localStorage.removeItem("results");
  alert("Reset Done");
  loadAdmin();
}

showSlide("home");
</script>

</body>
</html>
