  <!DOCTYPE html>
<html>
<head>
  <title>Physics Test Series</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{margin:0;font-family:'Segoe UI',Arial;background:#0f172a;color:white;}
    .navbar{display:flex;justify-content:space-between;padding:15px 25px;background:#020617;}
    .logo{font-size:20px;font-weight:bold;color:#38bdf8;cursor:pointer;}
    .menu a{color:white;margin-left:20px;text-decoration:none;cursor:pointer;}
    .menu a:hover{color:#38bdf8;}
    .container{max-width:800px;margin:30px auto;padding:20px;border-radius:10px;background:#1e293b;display:none;}
    input,textarea,select{padding:10px;width:95%;margin:10px 0;border-radius:5px;border:none;}
    .btn{padding:12px 20px;background:#38bdf8;border:none;border-radius:8px;cursor:pointer;font-weight:bold;margin-top:10px;width:100%;}
    .btn:hover{background:#0ea5e9;}
    .question-container{margin-top:20px;}
    .option-btn{display:block;width:100%;padding:12px;margin:8px 0;border:none;border-radius:6px;background:#334155;color:white;cursor:pointer;text-align:left;}
    .option-btn:hover{background:#0ea5e9;}
    .timer{text-align:right;font-weight:bold;color:#38bdf8;margin-top:10px;}
    .result{text-align:center;font-size:18px;margin-top:20px;}
    table{width:100%;border-collapse:collapse;margin-top:15px;}
    th,td{padding:10px;border:1px solid #38bdf8;text-align:left;}
    th{background:#0ea5e9;}
    .footer{text-align:center;padding:15px;background:#020617;margin-top:30px;}
  </style>
</head>
<body>

<div class="navbar">
  <div class="logo" onclick="showSlide('home')">Physics Test Series</div>
  <div class="menu">
    <a onclick="showAdmin()">Admin</a>
  </div>
</div>

<!-- Home Slide -->
<div class="container" id="home">
  <h1>Welcome to Physics Test Series</h1>
  <p>Enter your details to start the test.</p>
  <input type="text" id="studentName" placeholder="Enter Name">
  <input type="email" id="studentEmail" placeholder="Enter Email">
  <button class="btn" onclick="startTest()">Start Test</button>
</div>

<!-- Test Slide -->
<div class="container" id="test">
  <div class="timer">Time Left: <span id="timer">30</span> sec</div>
  <div class="question-container" id="question-container"></div>
</div>

<!-- Feedback Slide -->
<div class="container" id="feedback">
  <h2>Give your Feedback</h2>
  <label for="rating">Rating (1-5):</label>
  <select id="rating">
    <option value="">Select</option>
    <option value="1">1 - Poor</option>
    <option value="2">2 - Fair</option>
    <option value="3">3 - Good</option>
    <option value="4">4 - Very Good</option>
    <option value="5">5 - Excellent</option>
  </select>
  <textarea id="feedbackText" placeholder="Write your feedback..." rows="3"></textarea>
  <button class="btn" onclick="submitFeedback()">Submit Feedback</button>
</div>

<!-- Result Slide -->
<div class="container" id="result">
  <h2>Test Completed!</h2>
  <p id="score"></p>
  <div id="review"></div>
  <button class="btn" onclick="showSlide('home')">Go to Home</button>
</div>

<!-- Admin Slide -->
<div class="container" id="adminSlide">
  <h2>Admin Dashboard</h2>
  <p>Total Students: <span id="totalStudents">0</span></p>
  <h3>Student Results</h3>
  <table>
    <thead><tr><th>Name</th><th>Email</th><th>Score</th><th>Feedback</th></tr></thead>
    <tbody id="adminTable"></tbody>
  </table>
</div>

<div class="footer">© 2026 Physics Test Series</div>

<script>
let student={};
let currentQ=0;
let answers=[];
let timerInterval;
let timeLeft=30;

// Questions Array
const questions=[
{q:"Electric charge ka SI unit kya hai?", options:["Newton","Joule","Coulomb","Watt"], answer:2},
{q:"Electron par charge hota hai:", options:["Positive","Negative","Neutral","Zero"], answer:1},
{q:"Proton ka charge hota hai:", options:["Negative","Positive","Neutral","Varies"], answer:1},
{q:"Coulomb’s Law kis relation ko batata hai?", options:["Mass aur Force","Charge aur Force","Energy aur Power","Voltage aur Current"], answer:1},
{q:"Force depend karta hai:", options:["Distance","Charge","Medium","All of these"], answer:3},
{q:"Like charges:", options:["Attract","Repel","Neutral","None"], answer:1},
{q:"Unlike charges:", options:["Repel","Attract","Neutral","None"], answer:1},
{q:"Electric field unit:", options:["N/C","Volt","Joule","Ohm"], answer:0},
{q:"Field direction:", options:["Negative ki taraf","Positive se negative","Random","Circular"], answer:1},
{q:"Coulomb constant:", options:["9×10^9","3×10^8","6.67×10^-11","1.6×10^-19"], answer:0}
];

// Show slide
function showSlide(id){
  ["home","test","feedback","result","adminSlide"].forEach(s=>document.getElementById(s).style.display="none");
  document.getElementById(id).style.display="block";
}

// Start Test
function startTest(){
  let name=document.getElementById("studentName").value.trim();
  let email=document.getElementById("studentEmail").value.trim();
  if(!name || !email){alert("Enter Name and Email"); return;}
  student={name,email};
  currentQ=0; answers=[];
  showSlide('test');
  showQuestion();
}

// Show Question
function showQuestion(){
  clearInterval(timerInterval);
  timeLeft=30;
  document.getElementById("timer").innerText=timeLeft;
  const q=questions[currentQ];
  const container=document.getElementById("question-container");
  container.innerHTML=`<h3>Q${currentQ+1}: ${q.q}</h3>`;
  q.options.forEach((opt,i)=>{
    const btn=document.createElement("button");
    btn.className="option-btn";
    btn.innerText=opt;
    btn.onclick=()=>selectAnswer(i);
    container.appendChild(btn);
  });
  timerInterval=setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText=timeLeft;
    if(timeLeft<=0){
      clearInterval(timerInterval);
      selectAnswer(null);
    }
  },1000);
}

// Select Answer
function selectAnswer(i){
  answers[currentQ]=i;
  currentQ++;
  if(currentQ<questions.length){
    showQuestion();
  }else{
    showSlide('feedback');
  }
}

// Submit Feedback
function submitFeedback(){
  const rating=document.getElementById("rating").value;
  const text=document.getElementById("feedbackText").value.trim();
  if(!rating){alert("Select rating"); return;}
  // Save Result
  let score=0;
  questions.forEach((q,i)=>{if(answers[i]===q.answer) score++;});
  let percent=(score/questions.length*100).toFixed(2);
  let resultData={name:student.name,email:student.email,score,percent,rating,text};
  let data=JSON.parse(localStorage.getItem("students")||"[]");
  data.push(resultData);
  localStorage.setItem("students",JSON.stringify(data));
  showResult(score,percent);
}

// Show Result
function showResult(score,percent){
  showSlide('result');
  document.getElementById("score").innerHTML=`Score: ${score}/${questions.length} | Percentage: ${percent}%`;
  let reviewHtml="";
  questions.forEach((q,i)=>{
    let studentAns=answers[i]!==null?q.options[answers[i]]:"No Answer";
    reviewHtml+=`<p>Q${i+1}: Your Answer: ${studentAns} | Correct: ${q.options[q.answer]}</p>`;
  });
  document.getElementById("review").innerHTML=reviewHtml;
}

// Admin Dashboard
function showAdmin(){
  let pass=prompt("Enter Admin Password:");
  if(pass!=="PhysicsAdmin123"){alert("Access Denied"); return;}
  showSlide("adminSlide");
  const table=document.getElementById("adminTable");
  table.innerHTML="";
  const data=JSON.parse(localStorage.getItem("students")||"[]");
  document.getElementById("totalStudents").innerText=data.length;
  data.forEach(d=>{
    const row=document.createElement("tr");
    row.innerHTML=`<td>${d.name}</td><td>${d.email}</td><td>${d.score}/${questions.length} (${d.percent}%)</td><td>Rating: ${d.rating} | Comment: ${d.text}</td>`;
    table.appendChild(row);
  });
}

// Load Home
showSlide('home');
</script>

</body>
</html>
