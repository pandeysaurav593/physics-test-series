 <!DOCTYPE html>
<html>
<head>
<title>Exam Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  margin:0;
}

.container{
  max-width:700px;
  margin:40px auto;
  padding:25px;
  background:#1e293b;
  border-radius:15px;
  display:none;
}

#slide1{display:block;}

h1{
  color:#38bdf8;
  font-size:32px;
  text-align:center;
}

input,button,textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:8px;
}

button{
  background:#38bdf8;
  cursor:pointer;
  font-weight:bold;
}

.reset{
  position:fixed;
  bottom:10px;
  right:10px;
  background:red;
  color:white;
}

/* professional feel */
.card{
  background:#334155;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- Slide 1 -->
<div class="container" id="slide1">
  <h1>WELCOME</h1>
  <div class="card">
    <p>• Read each question carefully</p>
    <p>• Each question has 30 seconds</p>
    <p>• One email can attempt only once</p>
    <p>• Complete test honestly</p>
    <p>• Feedback is required after test</p>
  </div>
  <button onclick="nextSlide(2)">Start</button>
</div>

<!-- Slide 2 -->
<div class="container" id="slide2">
  <h2>Login</h2>
  <input id="name" placeholder="Name">
  <input id="email" placeholder="Email">
  <button onclick="login()">Verify</button>
</div>

<!-- Slide 3 -->
<div class="container" id="slide3">
  <h2>Select Chapter</h2>
  <button onclick="startChapter()">Chapter 1</button>
</div>

<!-- Slide 4 -->
<div class="container" id="slide4">
  <h2>Feedback</h2>
  <textarea id="feedback"></textarea>
  <button onclick="submitData()">Submit</button>
</div>

<!-- Slide 5 -->
<div class="container" id="slide5">
  <h2 id="result"></h2>
  <div id="review"></div>
</div>

<button class="reset" onclick="resetData()">Reset Data</button>

<script>

let student={};

// slide
function nextSlide(n){
document.querySelectorAll(".container").forEach(d=>d.style.display="none");
document.getElementById("slide"+n).style.display="block";
}

// login
function login(){
let n=name.value.trim();
let e=email.value.trim();

if(!n || !e.includes("@")){
alert("Invalid");
return;
}

// check duplicate email
let data=JSON.parse(localStorage.getItem("students")||"[]");
if(data.find(d=>d.email===e)){
alert("You already attempted test!");
return;
}

student={name:n,email:e};
localStorage.setItem("currentStudent",JSON.stringify(student));

nextSlide(3);
}

// go to chapter
function startChapter(){
window.location.href="chapter1.html";
}

// auto feedback open
window.onload=function(){
if(location.hash=="#feedback"){
nextSlide(4);
}
};

// submit final data
function submitData(){

let result=JSON.parse(localStorage.getItem("testResult"));

let data=JSON.parse(localStorage.getItem("students")||"[]");

let final={
name:result.name,
email:result.email,
score:result.score,
answers:result.answers,
feedback:feedback.value
};

data.push(final);
localStorage.setItem("students",JSON.stringify(data));

showResult(final);
}

// show result
function showResult(d){
nextSlide(5);

result.innerText=`Score: ${d.score}`;

let html="";
d.answers.forEach((a,i)=>{
html+=`<p>Q${i+1}: Your = ${a.user}, Correct = ${a.correct}</p>`;
});
review.innerHTML=html;
}

// reset
function resetData(){
if(confirm("Delete all data?")){
localStorage.clear();
location.reload();
}
}

</script>
</body>
</html>
