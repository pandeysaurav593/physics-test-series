 <!DOCTYPE html>
<html>
<head>
  <title>Physics Test Portal</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

  <style>
    body{margin:0;font-family:Arial;background:#0f172a;color:white;}
    .navbar{display:flex;justify-content:space-between;padding:15px;background:#020617;}
    .container{max-width:900px;margin:20px auto;padding:20px;background:#1e293b;border-radius:10px;display:none;}
    .btn{padding:10px;background:#38bdf8;border:none;border-radius:5px;margin-top:10px;cursor:pointer;}
    .answer-btn{display:block;width:100%;margin:8px 0;padding:10px;}
    table{width:100%;margin-top:10px;border-collapse:collapse;}
    td,th{border:1px solid #38bdf8;padding:8px;}
  </style>
</head>

<body>

<div class="navbar">
  <div onclick="showSlide('home')">Home</div>
  <div onclick="showAdmin()">Admin</div>
</div>

<!-- HOME -->
<div id="home" class="container">
  <h2>Instructions</h2>
  <ul>
    <li>Valid email required</li>
    <li>One attempt only</li>
    <li>30 sec per question</li>
    <li>Feedback mandatory</li>
  </ul>
  <button class="btn" onclick="showSlide('form')">Start</button>
</div>

<!-- FORM -->
<div id="form" class="container">
  <input id="name" placeholder="Name"><br>
  <input id="email" placeholder="Email"><br>
  <button class="btn" onclick="startTest()">Start Test</button>
</div>

<!-- TEST -->
<div id="test" class="container">
  <div id="qBox"></div>
</div>

<!-- RESULT -->
<div id="result" class="container">
  <h3 id="score"></h3>

  <h3>Feedback</h3>
  <select id="rating">
    <option value="">Rate</option>
    <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
  </select>
  <textarea id="fb"></textarea>
  <button class="btn" onclick="submitFeedback()">Submit</button>
</div>

<!-- ADMIN -->
<div id="admin" class="container">
  <button onclick="resetData()">Reset All</button>
  <h3>Total: <span id="total"></span></h3>

  <table>
    <thead><tr><th>Name</th><th>Email</th><th>Score</th></tr></thead>
    <tbody id="data"></tbody>
  </table>

  <h3>Feedback</h3>
  <table>
    <thead><tr><th>Name</th><th>Rating</th><th>Text</th></tr></thead>
    <tbody id="fbdata"></tbody>
  </table>
</div>

<script>

// 🔥 Firebase Config (APNA DALNA)
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// DATA
let student={},qIndex=0,answers=[];
const questions=[
  {q:"Unit of charge?",o:["Coulomb","Newton","Joule","Watt"],a:0},
  {q:"Electron charge?",o:["Positive","Negative","Neutral","None"],a:1}
];

// NAV
function showSlide(id){
  ["home","form","test","result","admin"].forEach(s=>document.getElementById(s).style.display="none");
  document.getElementById(id).style.display="block";
}

// START TEST
async function startTest(){
  let name=document.getElementById("name").value;
  let email=document.getElementById("email").value;

  let pattern=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
  if(!pattern.test(email)){alert("Invalid Email");return;}

  let snap=await db.collection("results").where("email","==",email).get();
  if(!snap.empty){alert("Already attempted");return;}

  student={name,email};
  qIndex=0;answers=[];
  showSlide("test");
  showQ();
}

// SHOW QUESTION
function showQ(){
  let box=document.getElementById("qBox");
  if(qIndex<questions.length){
    let q=questions[qIndex];
    box.innerHTML=`<h3>${q.q}</h3>`;
    q.o.forEach((opt,i)=>{
      box.innerHTML+=`<button class='answer-btn' onclick='ans(${i})'>${opt}</button>`;
    });
  } else finish();
}

// ANSWER
function ans(i){
  answers.push(i);
  qIndex++;
  showQ();
}

// FINISH
async function finish(){
  let score=0;
  questions.forEach((q,i)=>{if(q.a===answers[i])score++;});

  document.getElementById("score").innerText=`Score: ${score}`;

  await db.collection("results").add({
    name:student.name,email:student.email,score
  });

  showSlide("result");
}

// FEEDBACK
async function submitFeedback(){
  let rating=document.getElementById("rating").value;
  let text=document.getElementById("fb").value;

  await db.collection("feedbacks").add({
    name:student.name,rating,text
  });

  alert("Submitted");
}

// ADMIN
function showAdmin(){
  let p=prompt("pass");
  if(p==="1234"){showSlide("admin");loadAdmin();}
}

async function loadAdmin(){
  let data=document.getElementById("data");
  let fb=document.getElementById("fbdata");

  let res=await db.collection("results").get();
  data.innerHTML="";
  document.getElementById("total").innerText=res.size;

  res.forEach(d=>{
    let r=d.data();
    data.innerHTML+=`<tr><td>${r.name}</td><td>${r.email}</td><td>${r.score}</td></tr>`;
  });

  let f=await db.collection("feedbacks").get();
  fb.innerHTML="";
  f.forEach(d=>{
    let x=d.data();
    fb.innerHTML+=`<tr><td>${x.name}</td><td>${x.rating}</td><td>${x.text}</td></tr>`;
  });
}

// RESET
async function resetData(){
  let res=await db.collection("results").get();
  res.forEach(d=>d.ref.delete());

  let f=await db.collection("feedbacks").get();
  f.forEach(d=>d.ref.delete());

  alert("Reset Done");
  loadAdmin();
}

showSlide("home");

</script>
</body>
</html>
