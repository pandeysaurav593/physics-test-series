 <!DOCTYPE html>
<html>
<head>
  <title>Physics Test Series</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{margin:0;font-family:'Segoe UI',Arial;background:#0f172a;color:white;}
    .navbar{display:flex;justify-content:space-between;padding:15px 25px;background:#020617;}
    .logo{font-size:20px;font-weight:bold;color:#38bdf8;cursor:pointer;}
    .menu a{color:white;margin-left:20px;text-decoration:none;cursor:pointer;}
    .menu a:hover{color:#38bdf8;}
    .container{max-width:800px;margin:30px auto;padding:20px;border-radius:10px;background:#1e293b;}
    input{padding:10px;width:95%;margin:10px 0;border-radius:5px;border:none;}
    .btn{padding:12px 20px;background:#38bdf8;border:none;border-radius:8px;cursor:pointer;font-weight:bold;margin-top:10px;width:100%;}
    .btn:hover{background:#0ea5e9;}
    .footer{text-align:center;padding:15px;background:#020617;margin-top:30px;}
  </style>
</head>

<body>

<div class="navbar">
  <div class="logo" onclick="location.reload()">Physics Test</div>
</div>

<div class="container">
  <h1>Welcome to Physics Test Series</h1>
  <p>Enter your details and select chapter to start test.</p>

  <input type="text" id="name" placeholder="Enter Name">
  <input type="email" id="email" placeholder="Enter Email">

  <h3>Select Chapter</h3>

  <button class="btn" onclick="startTest('chapter1.html')">Chapter 1</button>
  <button class="btn" onclick="startTest('chapter2.html')">Chapter 2</button>
  <button class="btn" onclick="startTest('chapter3.html')">Chapter 3</button>
</div>

<div class="footer">© 2026 Physics Test Series</div>

<script>
function startTest(page){
  let name=document.getElementById("name").value.trim();
  let email=document.getElementById("email").value.trim();

  if(!name || !email){
    alert("Please enter name and email");
    return;
  }

  // Save data for next page
  localStorage.setItem("studentName", name);
  localStorage.setItem("studentEmail", email);

  // Redirect to chapter page
  window.location.href = page;
}
</script>

</body>
</html>
