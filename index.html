 <!DOCTYPE html>
<html>
<head>
<title>Exam System Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0;}
.container{max-width:700px;margin:30px auto;padding:20px;background:#1e293b;border-radius:10px;display:none;}
#slide1{display:block;}
input,button,textarea{width:100%;padding:10px;margin:8px 0;border:none;border-radius:5px;}
button{background:#38bdf8;cursor:pointer;}
.admin-btn{position:fixed;right:10px;top:10px;background:#f59e0b;padding:10px;border-radius:5px;}
table{background:white;color:black;width:100%;}
</style>
</head>

<body>

<div class="admin-btn" onclick="showAdmin()">Admin</div>

<div class="container" id="slide1">
<h2>Instructions</h2>
<p>• Read questions carefully</p>
<p>• Each test is timed</p>
<p>• Answers cannot be changed</p>
<p>• Complete all chapters</p>
<p>• Submit feedback after test</p>
<button onclick="nextSlide(2)">Next</button>
</div>

<div class="container" id="slide2">
<h2>Enter Details</h2>
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<button onclick="login()">Continue</button>
</div>

<div class="container" id="slide3">
<h2>Select Chapter</h2>
<button onclick="openChap('chapter1.html')">Chapter 1</button>
<button id="c2" disabled onclick="openChap('chapter2.html')">Chapter 2 🔒</button>
<button id="c3" disabled onclick="openChap('chapter3.html')">Chapter 3 🔒</button>
</div>

<div class="container" id="slide4">
<h2>Feedback</h2>
<textarea id="feedback"></textarea>
<button onclick="saveFeedback()">Submit</button>
</div>

<div class="container" id="admin">
<h2>Admin Panel</h2>
<p>Total: <span id="total"></span></p>
<table border="1">
<tr><th>Rank</th><th>Name</th><th>Email</th><th>Total</th></tr>
<tbody id="data"></tbody>
</table>
</div>

<script>

let student={};

function nextSlide(n){
document.querySelectorAll(".container").forEach(d=>d.style.display="none");
document.getElementById("slide"+n).style.display="block";
}

function login(){
let n=name.value.trim();
let e=email.value.trim();

if(!n || !e.includes("@")){
alert("Invalid");
return;
}

student={name:n,email:e};
localStorage.setItem("currentStudent",JSON.stringify(student));

nextSlide(3);
unlock();
}

function unlock(){
let data=JSON.parse(localStorage.getItem("students")||"[]");
let u=data.find(d=>d.email===student.email);

if(!u) return;

if(u.chapter1){
c2.disabled=false;
c2.innerText="Chapter 2";
}

if(u.chapter2){
c3.disabled=false;
c3.innerText="Chapter 3";
}
}

function openChap(p){
window.location.href=p;
}

window.onload=function(){
if(location.hash=="#feedback"){
nextSlide(4);
}
};

function saveFeedback(){

let res=JSON.parse(localStorage.getItem("students")||"[]");
let temp=JSON.parse(localStorage.getItem("currentStudent"));

let index=res.findIndex(d=>d.email===temp.email);

if(index>=0){
res[index].feedback=feedback.value;
}

localStorage.setItem("students",JSON.stringify(res));

alert("Saved!");
location.reload();
}

function showAdmin(){
let pass=prompt("Password");

if(pass!=="admin123"){
alert("Wrong");
return;
}

document.querySelectorAll(".container").forEach(d=>d.style.display="none");
admin.style.display="block";

loadAdmin();
}

function loadAdmin(){
let arr=JSON.parse(localStorage.getItem("students")||"[]");

arr.forEach(d=>{
d.total=(d.chapter1||0)+(d.chapter2||0)+(d.chapter3||0);
});

arr.sort((a,b)=>b.total-a.total);

total.innerText=arr.length;

let html="";
arr.forEach((d,i)=>{
html+=`<tr><td>${i+1}</td><td>${d.name}</td><td>${d.email}</td><td>${d.total}</td></tr>`;
});

data.innerHTML=html;
}

</script>
</body>
</html>
